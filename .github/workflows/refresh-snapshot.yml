name: Refresh market snapshot

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-market-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check scripts
        run: npm run check

      - name: Refresh snapshot
        run: npm run snapshot:force

      - name: Commit snapshot if changed
        shell: bash
        run: |
          if git diff --quiet -- data/market-snapshot.js; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-snapshot.js
          git commit -m "chore: refresh market snapshot"
          git push
